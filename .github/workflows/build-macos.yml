name: Build macOS ARM64 Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: # Permite disparar manualmente para pruebas

permissions:
  contents: write

jobs:
  build-macos:
    name: Build on macOS ARM64
    runs-on: macos-14 # Apple Silicon (M1/M2/M3)
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12" # Cambiado a 3.12 por estabilidad (según tu comentario)

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Executable
      run: python build.py

    - name: Verify dist folder
      run: ls -R dist/ # Esto te dirá en los logs si realmente se generó algo

    - uses: actions/upload-artifact@v4
      with:
        name: s3Uploader-macOS-arm64
        path: dist/*
        if-no-files-found: error # Si no hay archivos, el job fallará avisándote

  publish:
    name: Publish Release
    needs: build-macos
    runs-on: ubuntu-latest
    # CORRECCIÓN DE LA CONDICIÓN:
    if: always() && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
    
    steps:
    - name: Download macOS Artifact
      uses: actions/download-artifact@v4
      with:
        name: s3Uploader-macOS-arm64
        path: ./all-executables

    - name: Create/Update GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        # Si es manual, creará un release llamado "Manual-Build" o usará el tag si existe
        tag_name: ${{ github.ref_name }} 
        files: ./all-executables/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      timeout-minutes: 10