name: Build Multi-Platform Releases

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.14"
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Build Executable
      run: python build.py
    - uses: actions/upload-artifact@v4
      with:
        name: s3Uploader-${{ runner.os }}
        path: dist/*

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Create working directory
      run: mkdir ./all-executables

    # DESCARGAS INDIVIDUALES PARA EVITAR TIMEOUTS
    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: s3Uploader-Windows
        path: ./all-executables/windows

    - name: Download Linux Artifact
      uses: actions/download-artifact@v4
      with:
        name: s3Uploader-Linux
        path: ./all-executables/linux

    - name: Download macOS Artifact
      uses: actions/download-artifact@v4
      with:
        name: s3Uploader-macOS
        path: ./all-executables/macos

    - name: Check files
      run: ls -R ./all-executables

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./all-executables/**/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}