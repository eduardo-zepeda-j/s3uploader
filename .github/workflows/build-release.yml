name: Build Multi-Platform Releases

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Executable
      run: python build.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        # Guardamos cada ejecutable con un nombre único basado en el OS
        name: s3Uploader-${{ runner.os }}
        path: dist/*

  publish:
    name: Publish Release
    needs: build # Este trabajo espera a que los 3 de arriba terminen
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./all-executables
        pattern: s3Uploader-* # Baja los archivos de Windows, Mac y Linux
        merge-multiple: true

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./all-executables/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}